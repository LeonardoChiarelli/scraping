version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

  rabbitmq:
    image: rabbitmq:3-management-alpine
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: scraper
      POSTGRES_PASSWORD: password
      POSTGRES_DB: intelligence
    ports:
      - "5432:5432"

  worker:
    build: .
    depends_on:
      - redis
      - rabbitmq
      - postgres
    environment:
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      REDIS_URL: redis://redis:6379/0
      DB_DSN: postgresql://scraper:password@postgres:5432/intelligence
    command: scrapy crawl ecommerce_spider